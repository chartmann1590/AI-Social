// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
        classpath "org.jetbrains.kotlin:compose-compiler-gradle-plugin:2.1.20"
        classpath "org.jetbrains.kotlin:kotlin-serialization:2.1.20"
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    classpath('com.google.gms:google-services:4.4.2')
    classpath('com.google.firebase:firebase-crashlytics-gradle:3.0.3')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

// Override compileSdkVersion/targetSdkVersion (Expo's ExpoRootProjectPlugin only sets these
// via extra.setIfNotExist, so defining them here beforehand takes precedence).
ext {
  compileSdkVersion = 36
  targetSdkVersion = 36
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
