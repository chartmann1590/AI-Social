name: Content Report Trends

# Digests in-app "Report this post/comment" submissions (see
# src/components/ReportContentDialog.tsx, native-src/feedback/FeedbackModule.kt) and
# opens a summary issue mentioning the repo owner if reports are trending, so a spike
# in reports on one model/reason doesn't get lost in a stream of individual issues.

on:
  schedule:
    - cron: '0 13 * * *' # daily, 13:00 UTC
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'How many hours back to scan for content-report issues'
        required: false
        type: string
        default: '24'

permissions:
  issues: write
  contents: read

env:
  REPORT_OWNER: chartmann1590

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Digest content reports and alert on trends
        uses: actions/github-script@v7
        env:
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '24' }}
          TREND_THRESHOLD: '3'
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const lookbackHours = parseInt(process.env.LOOKBACK_HOURS, 10) || 24;
            const threshold = parseInt(process.env.TREND_THRESHOLD, 10) || 3;
            const since = new Date(Date.now() - lookbackHours * 60 * 60 * 1000);

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo,
              labels: 'content-report',
              state: 'all',
              since: since.toISOString(),
              per_page: 100,
            });

            // `since` filters by last-updated, not created — re-filter to issues actually
            // opened in the window so an old report someone just commented on isn't counted.
            const inWindow = issues.filter(
              (issue) => !issue.pull_request && new Date(issue.created_at) >= since,
            );

            core.info(`Found ${inWindow.length} content-report issue(s) in the last ${lookbackHours}h.`);

            if (inWindow.length < threshold) {
              core.info(`Below trend threshold (${threshold}) — no digest needed.`);
              return;
            }

            const reasonLabelPrefix = 'reason:';
            const byReason = new Map();
            const byModel = new Map();

            for (const issue of inWindow) {
              const reasonLabel = issue.labels
                .map((l) => (typeof l === 'string' ? l : l.name))
                .find((name) => name && name.startsWith(reasonLabelPrefix));
              const reasonKey = reasonLabel ? reasonLabel.slice(reasonLabelPrefix.length) : 'unknown';
              byReason.set(reasonKey, (byReason.get(reasonKey) || 0) + 1);

              const modelMatch = (issue.body || '').match(/## Model\n\n([^\n]+)/);
              const modelKey = modelMatch ? modelMatch[1].trim() : 'Unknown';
              byModel.set(modelKey, (byModel.get(modelKey) || 0) + 1);
            }

            const reasonRows = [...byReason.entries()]
              .sort((a, b) => b[1] - a[1])
              .map(([reason, count]) => `| ${reason} | ${count} |`)
              .join('\n');
            const modelRows = [...byModel.entries()]
              .sort((a, b) => b[1] - a[1])
              .map(([model, count]) => `| ${model} | ${count} |`)
              .join('\n');
            const issueLinks = inWindow.map((i) => `- #${i.number} — ${i.title}`).join('\n');

            const body = [
              `## \u{1F4C8} Content report trend: ${inWindow.length} reports in the last ${lookbackHours}h`,
              ``,
              `@${process.env.REPORT_OWNER}`,
              ``,
              `### By reason`,
              ``,
              `| Reason | Count |`,
              `|--------|-------|`,
              reasonRows,
              ``,
              `### By model`,
              ``,
              `| Model | Count |`,
              `|-------|-------|`,
              modelRows,
              ``,
              `### Reports`,
              ``,
              issueLinks,
            ].join('\n');

            await github.rest.issues.create({
              owner, repo,
              title: `Content report trend: ${inWindow.length} reports in ${lookbackHours}h`,
              body,
              labels: ['content-report-trend'],
            });
            core.info('Opened trend digest issue.');
