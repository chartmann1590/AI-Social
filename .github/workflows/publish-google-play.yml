# Builds and publishes the native `android/` project directly — it is committed
# to git and is the real source of truth, not a disposable `expo prebuild`
# regeneration. Previously this workflow ran `expo prebuild --platform android`
# fresh on every run; that produced a *different* build (wrong package name at
# one point, different compose/config-plugin output) than the app actually
# developed and tested locally, which Google Play rejected as incompatible
# with the app's existing release ("does not allow any existing users to
# upgrade"). If you change plugins/withFeedback.js, plugins/withLiteRtLlm.js,
# or app.json's android config, regenerate android/ locally and commit the
# result — this workflow will NOT pick up plugin changes automatically.
name: Publish to Google Play

on:
  workflow_dispatch:
    inputs:
      confirm_play_publish:
        description: 'Type "publish" to confirm you want to publish to Google Play production'
        required: true
        type: string
      release_notes:
        description: 'Optional release notes (en-US). If omitted, uses recent commits.'
        required: false
        type: string
        default: ''

concurrency:
  group: google-play-publish
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  publish:
    if: ${{ github.event.inputs.confirm_play_publish == 'publish' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fail unless publish is confirmed
        run: |
          echo "confirm_play_publish=${{ github.event.inputs.confirm_play_publish }}"
          echo "Proceeding with Google Play publish."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK extras
        run: |
          sdkmanager "build-tools;35.0.0" "ndk;28.2.13676358"

      - name: Install npm dependencies
        run: npm ci

      - name: Ensure src/config.ts
        run: |
          if [ ! -f src/config.ts ]; then
            cp src/config.example.ts src/config.ts
          fi

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:ci

      - name: Materialize google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p android/app
          echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Materialize release keystore
        env:
          ANDROID_CI_KEYSTORE_BASE64: ${{ secrets.ANDROID_CI_KEYSTORE_BASE64 }}
          ANDROID_CI_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_CI_KEYSTORE_PASSWORD }}
          ANDROID_CI_KEY_ALIAS: ${{ secrets.ANDROID_CI_KEY_ALIAS }}
          ANDROID_CI_KEY_PASSWORD: ${{ secrets.ANDROID_CI_KEY_PASSWORD }}
        run: |
          # This is a production Play Store publish — there's no legitimate reason to
          # ship a debug-signed build here, so a missing/bad keystore secret must fail
          # loudly and immediately rather than silently falling back to the debug
          # keystore (which Play would reject anyway, just after a wasted ~15min build).
          if [ -z "${ANDROID_CI_KEYSTORE_BASE64:-}" ] \
             || [ -z "${ANDROID_CI_KEYSTORE_PASSWORD:-}" ] \
             || [ -z "${ANDROID_CI_KEY_ALIAS:-}" ] \
             || [ -z "${ANDROID_CI_KEY_PASSWORD:-}" ]; then
            echo "::error::Keystore secrets are not fully set (need ANDROID_CI_KEYSTORE_BASE64, ANDROID_CI_KEYSTORE_PASSWORD, ANDROID_CI_KEY_ALIAS, ANDROID_CI_KEY_PASSWORD)."
            exit 1
          fi
          printf '%s' "$ANDROID_CI_KEYSTORE_BASE64" | tr -d ' \t\r\n' | base64 -d --ignore-garbage > "$RUNNER_TEMP/upload.jks"
          chmod 600 "$RUNNER_TEMP/upload.jks"
          if ! keytool -list -keystore "$RUNNER_TEMP/upload.jks" -storepass "$ANDROID_CI_KEYSTORE_PASSWORD" -alias "$ANDROID_CI_KEY_ALIAS" >/dev/null 2>&1; then
            echo "::error::Decoded keystore is invalid, or the alias/password don't match it. Check ANDROID_CI_KEYSTORE_BASE64/ANDROID_CI_KEY_ALIAS/ANDROID_CI_KEYSTORE_PASSWORD."
            exit 1
          fi
          echo "ANDROID_CI_KEYSTORE_PATH=$RUNNER_TEMP/upload.jks" >> "$GITHUB_ENV"
          echo "Keystore materialized and verified."

      - name: Load AdMob IDs
        env:
          SEC_APP: ${{ secrets.ADMOB_ANDROID_APP_ID }}
          SEC_BANNER: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}
          SEC_INT: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}
          SEC_NATIVE: ${{ secrets.ADMOB_NATIVE_AD_UNIT_ID }}
          SEC_REWARD: ${{ secrets.ADMOB_REWARDED_AD_UNIT_ID }}
          SEC_DELAY: ${{ secrets.ADMOB_DELAY_APP_MEASUREMENT_INIT }}
          SEC_OPT_INIT: ${{ secrets.ADMOB_OPTIMIZE_INITIALIZATION }}
          SEC_OPT_LOAD: ${{ secrets.ADMOB_OPTIMIZE_AD_LOADING }}
        run: |
          missing=()
          [ -n "${SEC_APP:-}" ]    || missing+=(ADMOB_ANDROID_APP_ID)
          [ -n "${SEC_BANNER:-}" ] || missing+=(ADMOB_BANNER_AD_UNIT_ID)
          [ -n "${SEC_INT:-}" ]    || missing+=(ADMOB_INTERSTITIAL_AD_UNIT_ID)
          [ -n "${SEC_NATIVE:-}" ] || missing+=(ADMOB_NATIVE_AD_UNIT_ID)
          [ -n "${SEC_REWARD:-}" ] || missing+=(ADMOB_REWARDED_AD_UNIT_ID)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub Secrets: ${missing[*]}."
            exit 1
          fi
          {
            echo "ADMOB_ANDROID_APP_ID=${SEC_APP}"
            echo "ADMOB_BANNER_AD_UNIT_ID=${SEC_BANNER}"
            echo "ADMOB_INTERSTITIAL_AD_UNIT_ID=${SEC_INT}"
            echo "ADMOB_NATIVE_AD_UNIT_ID=${SEC_NATIVE}"
            echo "ADMOB_REWARDED_AD_UNIT_ID=${SEC_REWARD}"
            echo "ADMOB_DELAY_APP_MEASUREMENT_INIT=${SEC_DELAY:-false}"
            echo "ADMOB_OPTIMIZE_INITIALIZATION=${SEC_OPT_INIT:-true}"
            echo "ADMOB_OPTIMIZE_AD_LOADING=${SEC_OPT_LOAD:-true}"
          } >> "$GITHUB_ENV"

      - name: Compute Play version codes
        id: versions
        run: |
          version_code="$(date -u +'%y%j%H%M')"
          version_name="1.1.0.$(date -u +'%Y%m%d.%H%M')"
          echo "ANDROID_VERSION_CODE=${version_code}" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_NAME=${version_name}" >> "$GITHUB_ENV"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "Computed versionCode=${version_code} versionName=${version_name}"

      - name: Write android/local.properties
        env:
          GH_PROXY_BASE_URL: ${{ vars.GH_PROXY_BASE_URL }}
          GH_PROXY_APP_SECRET: ${{ secrets.GH_PROXY_APP_SECRET }}
          GH_REPO_OWNER: ${{ vars.GH_REPO_OWNER }}
          GH_REPO_NAME: ${{ vars.GH_REPO_NAME }}
        run: |
          # Unlike the ADMOB_* secrets above, these previously had no presence
          # check at all — a missing/deleted GH_PROXY_APP_SECRET would silently
          # ship a production build with the in-app feedback tool permanently
          # disabled and nothing in CI flagging it.
          missing=()
          [ -n "${GH_PROXY_BASE_URL:-}" ]  || missing+=(GH_PROXY_BASE_URL)
          [ -n "${GH_PROXY_APP_SECRET:-}" ] || missing+=(GH_PROXY_APP_SECRET)
          [ -n "${GH_REPO_OWNER:-}" ]      || missing+=(GH_REPO_OWNER)
          [ -n "${GH_REPO_NAME:-}" ]       || missing+=(GH_REPO_NAME)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub Actions vars/secrets for the feedback proxy: ${missing[*]}."
            exit 1
          fi
          sdk="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          {
            echo "admob.android_app_id=${ADMOB_ANDROID_APP_ID}"
            echo "admob.banner_ad_unit_id=${ADMOB_BANNER_AD_UNIT_ID}"
            echo "admob.interstitial_ad_unit_id=${ADMOB_INTERSTITIAL_AD_UNIT_ID}"
            echo "admob.native_ad_unit_id=${ADMOB_NATIVE_AD_UNIT_ID}"
            echo "admob.rewarded_ad_unit_id=${ADMOB_REWARDED_AD_UNIT_ID}"
            echo "admob.delay_app_measurement_init=${ADMOB_DELAY_APP_MEASUREMENT_INIT}"
            echo "admob.optimize_initialization=${ADMOB_OPTIMIZE_INITIALIZATION}"
            echo "admob.optimize_ad_loading=${ADMOB_OPTIMIZE_AD_LOADING}"
            echo "github.proxy.base_url=${GH_PROXY_BASE_URL}"
            echo "app.proxy.secret=${GH_PROXY_APP_SECRET}"
            echo "github.repo.owner=${GH_REPO_OWNER}"
            echo "github.repo.name=${GH_REPO_NAME}"
            echo "sdk.dir=${sdk}"
          } > android/local.properties

      - name: Build Play release AAB
        working-directory: android
        env:
          ANDROID_CI_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_CI_KEYSTORE_PASSWORD }}
          ANDROID_CI_KEY_ALIAS: ${{ secrets.ANDROID_CI_KEY_ALIAS }}
          ANDROID_CI_KEY_PASSWORD: ${{ secrets.ANDROID_CI_KEY_PASSWORD }}
          GH_PROXY_BASE_URL: ${{ vars.GH_PROXY_BASE_URL }}
          GH_PROXY_APP_SECRET: ${{ secrets.GH_PROXY_APP_SECRET }}
          GH_REPO_OWNER: ${{ vars.GH_REPO_OWNER }}
          GH_REPO_NAME: ${{ vars.GH_REPO_NAME }}
        run: |
          chmod +x gradlew
          ./gradlew :app:bundleRelease --stacktrace

      - name: Verify AAB exists
        run: |
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          test -f "$AAB" || { echo "::error::AAB not found at $AAB"; exit 1; }
          ls -la "$AAB"

      - name: Generate Play release notes
        id: notes
        env:
          RELEASE_NOTES_INPUT: ${{ github.event.inputs.release_notes }}
        run: |
          NOTES="$RELEASE_NOTES_INPUT"
          if [ -n "$NOTES" ]; then
            echo "Using provided release notes."
          elif [ -f play-store/listing/release-notes.txt ]; then
            NOTES=$(cat play-store/listing/release-notes.txt)
          else
            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log "$PREV_TAG..HEAD" --oneline --no-decorate 2>/dev/null | head -20)
            fi
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Bug fixes and performance improvements."
          fi
          # Play rejects "whatsnew" text over 500 chars per language; truncate defensively
          # regardless of source so this can never fail the publish step outright.
          # `cut -c` is byte-oriented on this runner's locale and can split a multi-byte
          # UTF-8 character (e.g. from a non-ASCII commit message in the git-log fallback
          # above); truncate by Unicode code point in Node instead.
          mkdir -p distribution/whatsnew
          NOTES="$NOTES" node -e '
            const notes = process.env.NOTES ?? "";
            const chars = Array.from(notes);
            const truncated = chars.length > 497 ? chars.slice(0, 497).join("") + "..." : notes;
            require("fs").writeFileSync("distribution/whatsnew/whatsnew-en-US", truncated);
          '
          echo "Release notes:"
          cat distribution/whatsnew/whatsnew-en-US

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload mapping file (if present)
        uses: actions/upload-artifact@v4
        with:
          name: release-mapping
          path: android/app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: ignore

      - name: Verify service account JSON
        run: |
          if [ -z "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "::error::GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is not set."
            exit 1
          fi
          echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON is present."

      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.charles.aisocial
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          whatsNewDirectory: distribution/whatsnew
          # No mappingFile: minifyEnabled is off for this app (see android/app/build.gradle),
          # so no ProGuard/R8 mapping.txt is ever produced. Pointing this at a path that
          # never exists made the action throw ENOENT *after* successfully uploading the
          # AAB, aborting before it committed the Play Console edit — i.e. every previous
          # run got the bundle into Play's edit but never actually published it.
