# Fast PR-CI: TypeScript check + Jest unit tests on every push & PR.
# The release workflow (android-play-release.yml) reruns these as a gate
# before building the APK/AAB on master.
name: CI

on:
  push:
    branches-ignore:
      - master
      - main
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure src/config.ts (gitignored locally; needed for tsc)
        run: |
          set -euo pipefail
          if [ ! -f src/config.ts ]; then
            cp src/config.example.ts src/config.ts
          fi

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Jest unit tests
        run: npm run test:ci -- --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore
