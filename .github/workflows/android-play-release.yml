# Release APK + App Bundle for Google Play. Release builds use __DEV__ false (real ad SDK).
#
# Required repository secrets (set via `gh secret set`):
#   ADMOB_ANDROID_APP_ID, ADMOB_BANNER_AD_UNIT_ID, ADMOB_INTERSTITIAL_AD_UNIT_ID,
#   ADMOB_NATIVE_AD_UNIT_ID, ADMOB_REWARDED_AD_UNIT_ID,
#   ANDROID_CI_KEYSTORE_BASE64, ANDROID_CI_KEYSTORE_PASSWORD,
#   ANDROID_CI_KEY_ALIAS, ANDROID_CI_KEY_PASSWORD.
# Optional: ADMOB_DELAY_APP_MEASUREMENT_INIT, ADMOB_OPTIMIZE_INITIALIZATION, ADMOB_OPTIMIZE_AD_LOADING.
# CI loads AdMob secrets into env vars for `expo prebuild`, then writes them into
# android/local.properties (the single on-disk source of truth) before Gradle.

name: Android Play release (APK + AAB)

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: android-play-release
  cancel-in-progress: false

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.head_commit != null && !contains(github.event.head_commit.message, '[skip ci]'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Bump Play Store version code
        id: bump
        run: |
          set -euo pipefail
          mkdir -p ci
          f=ci/play-store-version-code
          v=$(cat "$f" 2>/dev/null || echo 0)
          v=$((v + 1))
          echo "$v" > "$f"
          echo "version_code=$v" >> "$GITHUB_OUTPUT"
          echo "Bumped versionCode to $v"

      - name: Install npm dependencies
        run: npm ci

      - name: Ensure src/config.ts (gitignored locally; required for release bundle)
        run: |
          set -euo pipefail
          if [ ! -f src/config.ts ]; then
            cp src/config.example.ts src/config.ts
            echo "Created src/config.ts from config.example.ts for CI bundling."
          fi

      - name: Load AdMob IDs from GitHub Secrets
        env:
          SEC_APP: ${{ secrets.ADMOB_ANDROID_APP_ID }}
          SEC_BANNER: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}
          SEC_INT: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}
          SEC_NATIVE: ${{ secrets.ADMOB_NATIVE_AD_UNIT_ID }}
          SEC_REWARD: ${{ secrets.ADMOB_REWARDED_AD_UNIT_ID }}
          SEC_DELAY: ${{ secrets.ADMOB_DELAY_APP_MEASUREMENT_INIT }}
          SEC_OPT_INIT: ${{ secrets.ADMOB_OPTIMIZE_INITIALIZATION }}
          SEC_OPT_LOAD: ${{ secrets.ADMOB_OPTIMIZE_AD_LOADING }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "${SEC_APP:-}" ]    || missing+=(ADMOB_ANDROID_APP_ID)
          [ -n "${SEC_BANNER:-}" ] || missing+=(ADMOB_BANNER_AD_UNIT_ID)
          [ -n "${SEC_INT:-}" ]    || missing+=(ADMOB_INTERSTITIAL_AD_UNIT_ID)
          [ -n "${SEC_NATIVE:-}" ] || missing+=(ADMOB_NATIVE_AD_UNIT_ID)
          [ -n "${SEC_REWARD:-}" ] || missing+=(ADMOB_REWARDED_AD_UNIT_ID)
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub Secrets: ${missing[*]}. Set them via gh secret set."
            exit 1
          fi
          # Expose to subsequent steps. app.config.js reads ADMOB_ANDROID_APP_ID from env when set,
          # which lets `expo prebuild` succeed without an android/ directory existing yet (prebuild
          # creates it). After prebuild we mirror these into android/local.properties for the record.
          {
            echo "ADMOB_ANDROID_APP_ID=${SEC_APP}"
            echo "ADMOB_BANNER_AD_UNIT_ID=${SEC_BANNER}"
            echo "ADMOB_INTERSTITIAL_AD_UNIT_ID=${SEC_INT}"
            echo "ADMOB_NATIVE_AD_UNIT_ID=${SEC_NATIVE}"
            echo "ADMOB_REWARDED_AD_UNIT_ID=${SEC_REWARD}"
            echo "ADMOB_DELAY_APP_MEASUREMENT_INIT=${SEC_DELAY:-false}"
            echo "ADMOB_OPTIMIZE_INITIALIZATION=${SEC_OPT_INIT:-true}"
            echo "ADMOB_OPTIMIZE_AD_LOADING=${SEC_OPT_LOAD:-true}"
          } >> "$GITHUB_ENV"
          echo "Loaded 5 AdMob IDs from GitHub Secrets."

      - name: Decode upload keystore (Play upload signing)
        env:
          ANDROID_CI_KEYSTORE_BASE64: ${{ secrets.ANDROID_CI_KEYSTORE_BASE64 }}
          ANDROID_CI_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_CI_KEYSTORE_PASSWORD }}
          ANDROID_CI_KEY_ALIAS: ${{ secrets.ANDROID_CI_KEY_ALIAS }}
          ANDROID_CI_KEY_PASSWORD: ${{ secrets.ANDROID_CI_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_CI_KEYSTORE_BASE64:-}" ] \
             || [ -z "${ANDROID_CI_KEYSTORE_PASSWORD:-}" ] \
             || [ -z "${ANDROID_CI_KEY_ALIAS:-}" ] \
             || [ -z "${ANDROID_CI_KEY_PASSWORD:-}" ]; then
            echo "::warning::Play upload keystore secrets not fully set — release will be signed with the debug keystore (CI OK; not for Play production)."
            exit 0
          fi
          # Strip every whitespace char so any encoding accident (CR/LF/space/tab) survives.
          printf '%s' "$ANDROID_CI_KEYSTORE_BASE64" | tr -d ' \t\r\n' | base64 -d --ignore-garbage > "$RUNNER_TEMP/upload.jks"
          if ! test -s "$RUNNER_TEMP/upload.jks"; then
            echo "::error::Keystore secret decoded to empty file. Re-set ANDROID_CI_KEYSTORE_BASE64 (single-line base64 of upload.jks)."
            exit 1
          fi
          chmod 600 "$RUNNER_TEMP/upload.jks"
          keytool -list -keystore "$RUNNER_TEMP/upload.jks" -storepass "$ANDROID_CI_KEYSTORE_PASSWORD" -alias "$ANDROID_CI_KEY_ALIAS" >/dev/null \
            || { echo "::error::Keystore loaded but alias/password mismatch (alias=$ANDROID_CI_KEY_ALIAS)."; exit 1; }
          echo "ANDROID_CI_KEYSTORE_PATH=$RUNNER_TEMP/upload.jks" >> "$GITHUB_ENV"
          echo "Keystore verified."

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Write android/local.properties (AdMob + sdk.dir)
        run: |
          set -euo pipefail
          sdk="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          test -n "$sdk"
          {
            echo "admob.android_app_id=${ADMOB_ANDROID_APP_ID}"
            echo "admob.banner_ad_unit_id=${ADMOB_BANNER_AD_UNIT_ID}"
            echo "admob.interstitial_ad_unit_id=${ADMOB_INTERSTITIAL_AD_UNIT_ID}"
            echo "admob.native_ad_unit_id=${ADMOB_NATIVE_AD_UNIT_ID}"
            echo "admob.rewarded_ad_unit_id=${ADMOB_REWARDED_AD_UNIT_ID}"
            echo "admob.delay_app_measurement_init=${ADMOB_DELAY_APP_MEASUREMENT_INIT}"
            echo "admob.optimize_initialization=${ADMOB_OPTIMIZE_INITIALIZATION}"
            echo "admob.optimize_ad_loading=${ADMOB_OPTIMIZE_AD_LOADING}"
            echo "sdk.dir=${sdk}"
          } > android/local.properties
          echo "android/local.properties (ad unit IDs masked):"
          sed -E 's#(=ca-app-pub-[^/~]+[/~])(.{4}).*#\1\2***#' android/local.properties

      - name: Build debug APK for e2e
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace

      - name: Enable KVM (emulator hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-android-33-google_apis-x86_64-v1

      - name: Pre-create AVD snapshot (cache miss only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "AVD created and cached."

      - name: e2e smoke test (Maestro on Android emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            set -euo pipefail
            adb wait-for-device
            adb shell input keyevent 82 || true
            APK=android/app/build/outputs/apk/debug/app-debug.apk
            test -f "$APK"
            adb install -r -t "$APK"
            curl -Ls "https://get.maestro.mobile.dev" | bash
            export PATH="$HOME/.maestro/bin:$PATH"
            maestro --version
            mkdir -p maestro-output
            maestro test --debug-output maestro-output .maestro/smoke.yaml

      - name: Upload Maestro debug output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug-output
          path: maestro-output
          if-no-files-found: ignore

      - name: Gradle release APK and bundle
        working-directory: android
        env:
          ANDROID_CI_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_CI_KEYSTORE_PASSWORD }}
          ANDROID_CI_KEY_ALIAS: ${{ secrets.ANDROID_CI_KEY_ALIAS }}
          ANDROID_CI_KEY_PASSWORD: ${{ secrets.ANDROID_CI_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Verify outputs and signing
        run: |
          set -euo pipefail
          AAB=android/app/build/outputs/bundle/release/app-release.aab
          APK=android/app/build/outputs/apk/release/app-release.apk
          test -f "$AAB"
          test -f "$APK"
          ls -la android/app/build/outputs/bundle/release/
          ls -la android/app/build/outputs/apk/release/
          BUILD_TOOLS=$(ls -1 "$ANDROID_SDK_ROOT/build-tools/" | sort -V | tail -1)
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner"
          "$APKSIGNER" verify --print-certs "$APK" | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-play-v${{ steps.bump.outputs.version_code }}
          name: Android Play v${{ steps.bump.outputs.version_code }}
          body: |
            Production AdMob release build (versionCode ${{ steps.bump.outputs.version_code }}).

            Attachments: app-release.aab for Play Console, app-release.apk for sideload or QA.
          files: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version code bump (best-effort, retries on concurrent push)
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/play-store-version-code
          if git diff --cached --quiet; then
            echo "No version-code change to commit."
            exit 0
          fi
          git commit -m "chore(ci): bump Play Store versionCode to ${{ steps.bump.outputs.version_code }} [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${{ github.ref_name }}"; then
              echo "Pushed version bump on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt — rebasing onto fresh origin/${{ github.ref_name }} and retrying."
            git fetch origin "${{ github.ref_name }}"
            git rebase "origin/${{ github.ref_name }}" || { git rebase --abort; sleep $((attempt * 2)); }
          done
          echo "::warning::Failed to push version-code bump after 5 attempts (release artifacts are already published)."
