# Release APK + App Bundle for Google Play. Release builds use __DEV__ false (real ad SDK).
#
# If ADMOB_* secrets are missing, CI uses Google's sample app + units so the workflow still builds.
# For production ads and Play upload signing, set the secrets below.
# Nothing in chat or in this file puts secrets on GitHub — run once (from AISocial/):
#   gh auth login
#   node scripts/push-admob-secrets-from-local-properties.mjs
#
# gh secret set ADMOB_ANDROID_APP_ID -b"ca-app-pub-XXXX~YYYY"
# gh secret set ADMOB_BANNER_AD_UNIT_ID -b"ca-app-pub-XXXX/ZZZZ"
# gh secret set ADMOB_INTERSTITIAL_AD_UNIT_ID -b"..."
# gh secret set ADMOB_NATIVE_AD_UNIT_ID -b"..."
# gh secret set ADMOB_REWARDED_AD_UNIT_ID -b"..."
# gh secret set ANDROID_CI_KEYSTORE_BASE64 -b"$(base64 -w0 upload.jks)"
# gh secret set ANDROID_CI_KEYSTORE_PASSWORD -b"..."
# gh secret set ANDROID_CI_KEY_ALIAS -b"..."
# gh secret set ANDROID_CI_KEY_PASSWORD -b"..."
# Optional: ADMOB_DELAY_APP_MEASUREMENT_INIT, ADMOB_OPTIMIZE_INITIALIZATION, ADMOB_OPTIMIZE_AD_LOADING, ADMOB_IOS_APP_ID

name: Android Play release (APK + AAB)

# Runs on every push to the default branches (and manual runs). The version-bump commit
# includes [skip ci] so that push does not start another build (infinite loop).
on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: android-play-release
  cancel-in-progress: false

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.head_commit != null && !contains(github.event.head_commit.message, '[skip ci]'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve AdMob env (secrets or Google sample IDs for CI)
        env:
          SEC_APP: ${{ secrets.ADMOB_ANDROID_APP_ID }}
          SEC_BANNER: ${{ secrets.ADMOB_BANNER_AD_UNIT_ID }}
          SEC_INT: ${{ secrets.ADMOB_INTERSTITIAL_AD_UNIT_ID }}
          SEC_NATIVE: ${{ secrets.ADMOB_NATIVE_AD_UNIT_ID }}
          SEC_REWARD: ${{ secrets.ADMOB_REWARDED_AD_UNIT_ID }}
          SEC_DELAY: ${{ secrets.ADMOB_DELAY_APP_MEASUREMENT_INIT }}
          SEC_OPT_INIT: ${{ secrets.ADMOB_OPTIMIZE_INITIALIZATION }}
          SEC_OPT_LOAD: ${{ secrets.ADMOB_OPTIMIZE_AD_LOADING }}
          SEC_IOS: ${{ secrets.ADMOB_IOS_APP_ID }}
        run: |
          set -euo pipefail
          emit() {
            local name="$1" secret="$2" fallback="$3"
            if [ -n "$secret" ]; then
              printf '%s=%s\n' "$name" "$secret" >> "$GITHUB_ENV"
            else
              printf '%s=%s\n' "$name" "$fallback" >> "$GITHUB_ENV"
            fi
          }
          # https://developers.google.com/admob/android/test-ads — sample app + units (no revenue)
          emit ADMOB_ANDROID_APP_ID "$SEC_APP" "ca-app-pub-3940256099942544~3347511713"
          emit ADMOB_BANNER_AD_UNIT_ID "$SEC_BANNER" "ca-app-pub-3940256099942544/6300978111"
          emit ADMOB_INTERSTITIAL_AD_UNIT_ID "$SEC_INT" "ca-app-pub-3940256099942544/1033173712"
          emit ADMOB_NATIVE_AD_UNIT_ID "$SEC_NATIVE" "ca-app-pub-3940256099942544/2247696110"
          emit ADMOB_REWARDED_AD_UNIT_ID "$SEC_REWARD" "ca-app-pub-3940256099942544/5224354917"
          if [ -z "$SEC_APP" ] || [ -z "$SEC_BANNER" ] || [ -z "$SEC_INT" ] || [ -z "$SEC_NATIVE" ] || [ -z "$SEC_REWARD" ]; then
            echo "::warning::Missing one or more ADMOB_* secrets — using Google sample IDs. Set secrets for production ad units."
          fi
          if [ -n "$SEC_DELAY" ]; then printf 'ADMOB_DELAY_APP_MEASUREMENT_INIT=%s\n' "$SEC_DELAY" >> "$GITHUB_ENV"; fi
          if [ -n "$SEC_OPT_INIT" ]; then printf 'ADMOB_OPTIMIZE_INITIALIZATION=%s\n' "$SEC_OPT_INIT" >> "$GITHUB_ENV"; fi
          if [ -n "$SEC_OPT_LOAD" ]; then printf 'ADMOB_OPTIMIZE_AD_LOADING=%s\n' "$SEC_OPT_LOAD" >> "$GITHUB_ENV"; fi
          if [ -n "$SEC_IOS" ]; then printf 'ADMOB_IOS_APP_ID=%s\n' "$SEC_IOS" >> "$GITHUB_ENV"; fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Bump Play Store version code
        id: bump
        run: |
          mkdir -p ci
          f=ci/play-store-version-code
          v=$(cat "$f" 2>/dev/null || echo 0)
          v=$((v + 1))
          echo "$v" > "$f"
          echo "version_code=$v" >> "$GITHUB_OUTPUT"
          echo "Bumped versionCode to $v"

      - name: Install npm dependencies
        run: npm ci

      - name: Ensure src/config.ts (gitignored locally; required for release bundle)
        run: |
          set -euo pipefail
          if [ ! -f src/config.ts ]; then
            cp src/config.example.ts src/config.ts
            echo "Created src/config.ts from config.example.ts for CI bundling."
          fi

      - name: Decode upload keystore (optional — Play upload key)
        env:
          ANDROID_CI_KEYSTORE_BASE64: ${{ secrets.ANDROID_CI_KEYSTORE_BASE64 }}
          ANDROID_CI_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_CI_KEYSTORE_PASSWORD }}
          ANDROID_CI_KEY_ALIAS: ${{ secrets.ANDROID_CI_KEY_ALIAS }}
          ANDROID_CI_KEY_PASSWORD: ${{ secrets.ANDROID_CI_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$ANDROID_CI_KEYSTORE_BASE64" ] || [ -z "$ANDROID_CI_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_CI_KEY_ALIAS" ] || [ -z "$ANDROID_CI_KEY_PASSWORD" ]; then
            echo "::warning::Play upload keystore secrets not fully set — release will be signed with the debug keystore (CI OK; not for Play production)."
            exit 0
          fi
          RAW="${ANDROID_CI_KEYSTORE_BASE64//$'\r'/}"
          RAW="${RAW//$'\n'/}"
          printf '%s' "$RAW" | base64 -d > "$RUNNER_TEMP/upload.jks"
          if ! test -s "$RUNNER_TEMP/upload.jks"; then
            echo "::error::Keystore secret set but decoded to empty file. Fix ANDROID_CI_KEYSTORE_BASE64 (single-line base64)."
            exit 1
          fi
          chmod 600 "$RUNNER_TEMP/upload.jks"
          echo "ANDROID_CI_KEYSTORE_PATH=$RUNNER_TEMP/upload.jks" >> "$GITHUB_ENV"

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install

      - name: Point Gradle at Android SDK
        run: |
          sdk="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          test -n "$sdk"
          printf 'sdk.dir=%s\n' "$sdk" > android/local.properties

      - name: Gradle release APK and bundle
        working-directory: android
        env:
          ANDROID_CI_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_CI_KEYSTORE_PASSWORD }}
          ANDROID_CI_KEY_ALIAS: ${{ secrets.ANDROID_CI_KEY_ALIAS }}
          ANDROID_CI_KEY_PASSWORD: ${{ secrets.ANDROID_CI_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --stacktrace

      - name: Verify outputs
        run: |
          test -f android/app/build/outputs/bundle/release/app-release.aab
          test -f android/app/build/outputs/apk/release/app-release.apk
          ls -la android/app/build/outputs/bundle/release/
          ls -la android/app/build/outputs/apk/release/

      - name: Commit version code bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci/play-store-version-code
          git status
          git commit -m "chore(ci): bump Play Store versionCode to ${{ steps.bump.outputs.version_code }} [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-play-v${{ steps.bump.outputs.version_code }}
          name: Android Play v${{ steps.bump.outputs.version_code }}
          body: |
            Production AdMob release build (versionCode ${{ steps.bump.outputs.version_code }}).

            Attachments: app-release.aab for Play Console, app-release.apk for sideload or QA.
          files: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}